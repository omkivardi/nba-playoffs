<style>

  .tabs-inner { max-width: 600px; margin: 0 auto; display: flex; min-width: max-content; }

  .champ-deadline-title { font-family: 'Bebas Neue', cursive; font-size: 18px; color: var(--gold); margin-bottom: 4px; }

  .champ-team-btn { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 14px 12px; cursor: pointer; transition: all 0.2s; text-align: center; font-family: 'Heebo', sans-serif; color: var(--text); }
  .champ-team-btn:hover:not(:disabled) { border-color: var(--gold); }
  .champ-team-btn.selected { background: rgba(251,191,36,0.15); border-color: var(--gold); }

  .admin-section-title { font-size: 13px; color: var(--muted); margin-bottom: 10px; margin-top: 18px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .admin-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  select, .admin-input { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 13px; outline: none; flex: 1; }

  .btn-admin { background: var(--gold); color: #000; border: none; border-radius: 8px; padding: 10px 16px; font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }

  .btn-close { background: var(--card2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-family: 'Heebo', sans-serif; font-size: 13px; cursor: pointer; margin-top: 16px; width: 100%; }

  .admin-fab { position: fixed; bottom: 24px; left: 24px; z-index: 150; background: var(--gold); color: #000; border: none; border-radius: 50%; width: 52px; height: 52px; font-size: 22px; cursor: pointer; box-shadow: 0 4px 20px rgba(251,191,36,0.4); transition: transform 0.2s; }
  .admin-fab:hover { transform: scale(1.1); }
  .admin-login { text-align: center; }
  .admin-login input { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 15px; outline: none; margin-bottom: 12px; text-align: center; }
  .section-divider { height: 1px; background: var(--border); margin: 24px 0 8px; }
  .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 14px; }
  .loading { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
const SUPABASE_URL = 'https://fvhhaulaswenwnxndvsd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eaFXoMmHnbA_-MoDKFiRuw_End-ICiK';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// נקודות לפי קבוצה
const CHAMP_POINTS = {

  'Knicks': 11, 'Pistons': 11, 'Rockets': 14, 'Timberwolves': 15,

  'Lakers': 23, 'Warriors': 26, 'Suns': 26, 'Trail Blazers': 27,
  'Clippers': 27, 'Heat': 27
};

const CHAMP_TEAMS = [
  'Thunder','Spurs','Celtics','Nuggets','Cavaliers','Knicks','Pistons',
  'Rockets','Timberwolves','Hornets','Hawks','76ers','Magic','Raptors',
  'Lakers','Warriors','Suns','Trail Blazers','Clippers','Heat'
];

// דדליין לזוכה
const CHAMP_DEADLINE = '2026-04-20T03:00:00Z';

const DEFAULT_SERIES = [
  { id: 'e1s1', conf: 'east', round: 1, name: 'מזרח סדרה 1', team1: 'Pistons', team2: 'TBD (7/8)', deadline: '2026-04-20T03:00:00Z' },
  { id: 'e1s2', conf: 'east', round: 1, name: 'מזרח סדרה 2', team1: 'Cavaliers', team2: 'Raptors', deadline: '2026-04-20T03:00:00Z' },
  { id: 'e1s3', conf: 'east', round: 1, name: 'מזרח סדרה 3', team1: 'Knicks', team2: 'Hawks', deadline: '2026-04-20T03:00:00Z' },
  { id: 'e1s4', conf: 'east', round: 1, name: 'מזרח סדרה 4', team1: 'Celtics', team2: 'TBD (7/8)', deadline: '2026-04-20T03:00:00Z' },
  { id: 'w1s1', conf: 'west', round: 1, name: 'מערב סדרה 1', team1: 'Thunder', team2: 'TBD (8/9)', deadline: '2026-04-20T03:00:00Z' },
  { id: 'w1s2', conf: 'west', round: 1, name: 'מערב סדרה 2', team1: 'Lakers', team2: 'Rockets', deadline: '2026-04-20T03:00:00Z' },
  { id: 'w1s3', conf: 'west', round: 1, name: 'מערב סדרה 3', team1: 'Nuggets', team2: 'Timberwolves', deadline: '2026-04-20T03:00:00Z' },
  { id: 'w1s4', conf: 'west', round: 1, name: 'מערב סדרה 4', team1: 'Spurs', team2: 'TBD (7/8)', deadline: '2026-04-20T03:00:00Z' },

  { id: 'e2s2', conf: 'east', round: 2, name: 'מזרח סיבוב 2 — סדרה 2', team1: 'TBD', team2: 'TBD', deadline: null },
  { id: 'w2s1', conf: 'west', round: 2, name: 'מערב סיבוב 2 — סדרה 1', team1: 'TBD', team2: 'TBD', deadline: null },
  { id: 'w2s2', conf: 'west', round: 2, name: 'מערב סיבוב 2 — סדרה 2', team1: 'TBD', team2: 'TBD', deadline: null },
  { id: 'ecf', conf: 'east', round: 3, name: 'גמר מזרח', team1: 'TBD', team2: 'TBD', deadline: null },
  { id: 'wcf', conf: 'west', round: 3, name: 'גמר מערב', team1: 'TBD', team2: 'TBD', deadline: null },
  { id: 'nba_finals', conf: 'finals', round: 4, name: 'גמר NBA', team1: 'TBD', team2: 'TBD', deadline: null },
];

let currentUser = null, currentTab = 'east';
let allPicks = {}, communityPicks = {}, results = {};
let seriesData = DEFAULT_SERIES.map(s => ({...s}));
let champPick = null, champResult = null, champCommunity = [];
let adminAuthenticated = false;
let countdownInterval = null;

// ---- AUTH ----
async function login() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const nickname = document.getElementById('login-nickname').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!email || !email.includes('@')) { errEl.textContent = 'נא להכניס כתובת מייל תקינה'; return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'מתחבר...';

  // Check if user exists by email
  const { data: existing } = await db.from('users').select('*').eq('email', email).single();

  if (existing) {
    // Returning user — login directly
    currentUser = { id: existing.id, nickname: existing.nickname, email: existing.email };
  } else {
    // New user — need nickname
    if (!nickname || nickname.length < 2) {
      errEl.textContent = 'משתמש חדש — נא להכניס כינוי (לפחות 2 תווים)';
      btn.disabled = false; btn.textContent = 'כניסה / הרשמה';
      return;
    }
    const { data, error } = await db.from('users').insert(
      { email, nickname, updated_at: new Date().toISOString() }
    ).select().single();
    if (error) { errEl.textContent = 'שגיאה: ' + error.message; btn.disabled = false; btn.textContent = 'כניסה / הרשמה'; return; }
    currentUser = { id: data.id, nickname: data.nickname, email: data.email };
  }

  try { localStorage.setItem('nba_user', JSON.stringify(currentUser)); } catch(e) {}
  showApp();
}

function logout() {
  currentUser = null;
  try { localStorage.removeItem('nba_user'); } catch(e) {}
  if (countdownInterval) clearInterval(countdownInterval);
  document.getElementById('app').style.display = 'none';
  document.getElementById('admin-fab').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

async function loadAll() {
  const { data: dbSeries } = await db.from('series').select('*').order('round').order('id');
  if (dbSeries && dbSeries.length > 0) seriesData = dbSeries;

  const { data: picks } = await db.from('picks').select('*').eq('user_id', currentUser.id);
  allPicks = {};
  if (picks) picks.forEach(p => { allPicks[p.series_id] = { winner: p.winner, games: p.games }; });

  const { data: res } = await db.from('results').select('*');
  results = {};
  if (res) res.forEach(r => {
    if (r.series_id === 'champ') { champResult = r.winner; }
    else { results[r.series_id] = { winner: r.winner, games: r.games }; }
  });

  champPick = allPicks['champ']?.winner || null;

  await loadCommunityPicks();
}

async function loadCommunityPicks() {
  communityPicks = {};
  champCommunity = [];
  const { data: picksData } = await db.from('picks').select('series_id, winner, games, user_id');
  const { data: usersData } = await db.from('users').select('id, nickname');
  if (!picksData) return;
  const usersMap = {};
  if (usersData) usersData.forEach(u => { usersMap[u.id] = u.nickname; });

  const maps = {};
  picksData.forEach(p => {
    if (!p.winner) return;
    if (p.series_id === 'champ') {
      let entry = champCommunity.find(x => x.winner === p.winner);
      if (!entry) { entry = { winner: p.winner, count: 0, names: [] }; champCommunity.push(entry); }
      entry.count++;
      const name = usersMap[p.user_id];
      if (name) entry.names.push(name);
      return;
    }
    const key = p.winner + '|||' + (p.games || '');
    if (!maps[p.series_id]) maps[p.series_id] = {};
    if (!maps[p.series_id][key]) maps[p.series_id][key] = { winner: p.winner, games: p.games, count: 0, names: [] };
    maps[p.series_id][key].count++;
    const name = usersMap[p.user_id];
    if (name) maps[p.series_id][key].names.push(name);
  });
  Object.keys(maps).forEach(sid => { communityPicks[sid] = Object.values(maps[sid]); });
}

// ---- COUNTDOWN ----
function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  updateCountdown();
  countdownInterval = setInterval(updateCountdown, 1000);
}

function updateCountdown() {
  const now = new Date();
  // Find next upcoming deadline
  const upcoming = [...seriesData, { id: 'champ', deadline: CHAMP_DEADLINE, name: 'הימור זוכה' }]
    .filter(s => s.deadline && now < new Date(s.deadline))
    .sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

  const bar = document.getElementById('countdown-bar');
  if (!upcoming.length) { bar.style.display = 'none'; return; }

  const next = upcoming[0];
  const diff = new Date(next.deadline) - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const timeStr = h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`;

  bar.style.display = 'block';
  document.getElementById('countdown-label').textContent = `⏱ דדליין הבא (${next.name}):`;
  const timeEl = document.getElementById('countdown-time');
  timeEl.textContent = timeStr;
  timeEl.className = 'countdown-time' + (h < 1 ? ' countdown-urgent' : '');
}

function switchTab(tab) {

    b.classList.toggle('active', ['east','west','finals','champ','table','bets','rules'][i] === tab);

}

function renderTab() {

  if (currentTab === 'table') { renderTable(); return; }
  if (currentTab === 'rules') { renderRules(); return; }
  if (currentTab === 'bets') { renderBets(); return; }
  if (currentTab === 'champ') { renderChamp(); return; }
  const conf = currentTab;
  let html = '';
  const rounds = [...new Set(seriesData.filter(s => s.conf === conf).map(s => s.round))].sort();
  for (const round of rounds) {
    const series = seriesData.filter(s => s.conf === conf && s.round === round);
    if (!series.length) continue;
    const roundNames = { 1: 'סיבוב ראשון', 2: 'סיבוב שני', 3: 'גמר כנף', 4: 'גמר NBA' };
    html += `<div class="round-header"><div class="round-title">${roundNames[round] || 'סיבוב ' + round}</div></div>`;
    for (const s of series) html += renderSeriesCard(s);
  }
  if (!html) html = '<div class="empty-state">אין סדרות עדיין</div>';
  el.innerHTML = html;
}

// ---- SERIES CARD ----
function renderSeriesCard(s) {
  const now = new Date();
  const isLocked = !!results[s.id];
  const deadlinePassed = s.deadline && now > new Date(s.deadline);
  const hasResult = results[s.id];
  const myPick = allPicks[s.id];
  const isTBD = s.team1.startsWith('TBD') || s.team2.startsWith('TBD');
  const canPick = !isLocked && !deadlinePassed && !isTBD;

  let deadlineStr = '';
  if (s.deadline) {
    const dl = new Date(s.deadline);
    deadlineStr = deadlinePassed ? 'דדליין נסגר' : `דדליין: ${dl.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'})} ${dl.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}`;
  }

  let pointsBadge = '';
  if (hasResult && myPick) {
    if (myPick.winner === hasResult.winner && myPick.games == hasResult.games) pointsBadge = `<span class="points-badge">+5 ✓</span>`;
    else if (myPick.winner === hasResult.winner) pointsBadge = `<span class="points-badge partial">+3</span>`;
  }

  let t1Class = 'team-btn', t2Class = 'team-btn';
  if (myPick?.winner === s.team1) t1Class += ' selected';
  if (myPick?.winner === s.team2) t2Class += ' selected';
  if (hasResult) {
    t1Class += hasResult.winner === s.team1 ? ' winner-correct' : ' winner-wrong';
    t2Class += hasResult.winner === s.team2 ? ' winner-correct' : ' winner-wrong';
  }

  const teamsHtml = `
    <div class="teams-grid">
      <button class="${t1Class}" onclick="pickTeam('${s.id}','${s.team1}')" ${!canPick?'disabled':''}>${s.team1}</button>
      <button class="${t2Class}" onclick="pickTeam('${s.id}','${s.team2}')" ${!canPick?'disabled':''}>${s.team2}</button>
    </div>`;

  let gamesHtml = '';
  if (!isTBD) {
    gamesHtml = `
      <div class="games-label">${isLocked ? (myPick?.winner ? 'בחרת:' : '') : 'כמה משחקים?'}</div>
      <div class="games-grid">
        ${[4,5,6,7].map(g => `
          <button class="games-btn ${myPick?.games==g?'selected':''} ${hasResult?.games==g?'winner-correct':''}"
            onclick="pickGames('${s.id}',${g})" ${(isLocked||deadlinePassed||!myPick?.winner)?'disabled':''}>${g}</button>
        `).join('')}
      </div>`;
  }

  // Community
  let communityHtml = '';
  if (!isTBD && communityPicks[s.id]?.length) {
    const total = communityPicks[s.id].reduce((a,b) => a+b.count, 0);
    const sorted = [...communityPicks[s.id]].sort((a,b) => b.count-a.count);
    communityHtml = `
      <div class="community-section">
        <div class="community-label">${deadlinePassed ? 'מי הימר מה' : 'ניחושי הקבוצה'} (${total})</div>
        ${sorted.map(p => {
          const pct = Math.round(p.count/total*100);
          const gLabel = p.games ? ` (${p.games})` : '';
          return `<div class="pct-row">
            <div class="pct-header"><span>${p.winner}${gLabel}</span><span>${pct}%</span></div>
            <div class="pct-bar-bg"><div class="pct-bar-fill" style="width:${pct}%"></div></div>
            ${deadlinePassed ? `<div class="pct-names">${p.names.join(', ')}</div>` : ''}
          </div>`;
        }).join('')}
      </div>`;
  }

  const lockedHtml = isTBD
    ? `<div class="locked-notice">⏳ ממתין לקביעת הקבוצות</div>`
    : isLocked ? `<div class="locked-notice">🔒 נסגר — ${hasResult.winner} ניצחה</div>`
    : deadlinePassed ? `<div class="locked-notice" style="border-color:rgba(249,115,22,0.3);color:var(--accent)">⏰ דדליין עבר — ממתין לתוצאה</div>` : '';

  return `
    <div class="series-card ${(isLocked||deadlinePassed)?'locked':''}">
      <div class="series-meta">
        <div><div class="series-name">${s.name}</div>${pointsBadge}</div>
        <div class="series-deadline ${deadlinePassed?'expired':''}">${deadlineStr}</div>
      </div>
      ${teamsHtml}${gamesHtml}${communityHtml}${lockedHtml}
    </div>`;
}

async function pickTeam(seriesId, team) {
  const s = seriesData.find(x => x.id === seriesId);
  if (!s) return;
  const now = new Date();
  if (results[seriesId] || (s.deadline && now > new Date(s.deadline))) return;
  if (!allPicks[seriesId]) allPicks[seriesId] = {};
  allPicks[seriesId].winner = team; allPicks[seriesId].games = null;
  renderTab();
  await savePick(seriesId);
  await loadCommunityPicks();
  renderTab();
}

async function pickGames(seriesId, games) {
  if (!allPicks[seriesId]?.winner) return;
  allPicks[seriesId].games = games;
  renderTab();
  await savePick(seriesId);
}

async function savePick(seriesId) {
  const pick = allPicks[seriesId];
  if (!pick?.winner) return;
  // Double-check deadline server-side
  const s = seriesData.find(x => x.id === seriesId);
  if (s?.deadline && new Date() > new Date(s.deadline)) {
    console.warn('Deadline passed, pick rejected');
    return;
  }
  await db.from('picks').upsert({
    user_id: currentUser.id, series_id: seriesId,
    winner: pick.winner, games: pick.games, updated_at: new Date().toISOString()
  }, { onConflict: 'user_id,series_id' });
}

async function renderTable() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>מחשב ניקוד...</div>';
  const { data: users } = await db.from('users').select('*');
  const { data: allPicksData } = await db.from('picks').select('*');
  const { data: resData } = await db.from('results').select('*');
  if (!users?.length) { el.innerHTML = '<div class="empty-state">אין שחקנים עדיין</div>'; return; }
  const resultsMap = {};
  if (resData) resData.forEach(r => { resultsMap[r.series_id] = r; });

  // Load penalties
  const { data: penaltiesData } = await db.from('penalties').select('*');
  const penaltiesMap = {};
  if (penaltiesData) penaltiesData.forEach(p => {
    if (!penaltiesMap[p.user_id]) penaltiesMap[p.user_id] = 0;
    penaltiesMap[p.user_id] += p.points;
  });

  const scores = users.map(u => {
    const myPicks = (allPicksData||[]).filter(p => p.user_id === u.id);
    let total = 0, exact = 0, winner = 0, champBonus = 0;
    // Check if user picked champ before deadline
    const champPicked = myPicks.find(p => p.series_id === 'champ');
    const champDeadlinePassed = new Date() > new Date(CHAMP_DEADLINE);
    myPicks.forEach(p => {
      if (p.series_id === 'champ') {
        const champRes = resultsMap['champ'];
        if (champRes && p.winner === champRes.winner && champPicked) {
          champBonus = CHAMP_POINTS[p.winner] || 0;
          total += champBonus;
        }
        return;
      }
      const r = resultsMap[p.series_id];
      if (!r) return;
      if (p.winner === r.winner && p.games == r.games) { total += 5; exact++; }
      else if (p.winner === r.winner) { total += 3; winner++; }
    });
    // Apply penalties
    const penalty = penaltiesMap[u.id] || 0;
    total += penalty; // penalty is negative
    return { ...u, total, exact, winner, champBonus, penalty };
  }).sort((a,b) => b.total - a.total);

  let html = '<div class="leaderboard">';
  scores.forEach((s, i) => {
    const isMe = s.id === currentUser.id;
    const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const rankEmoji = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
    html += `
      <div class="lb-row ${isMe?'me':''}">
        <div class="lb-rank ${rankClass}">${rankEmoji}</div>
        <div class="lb-name-col">
          <div class="lb-name">${s.nickname} ${isMe?'(אתה)':''}</div>
          <div class="lb-breakdown">${s.exact} מדויק×5 + ${s.winner} מנצח×3${s.champBonus?` + זוכה×${s.champBonus}`:''}${s.penalty?` <span style='color:var(--red)'>${s.penalty} עונש</span>`:''}</div>
        </div>
        <div class="lb-score">${s.total}</div>
      </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

    return (deadlinePassed || !!results[s.id]) && !s.team1.startsWith('TBD') && !s.team2.startsWith('TBD');
  });

  if (!lockedSeries.length) {
    el.innerHTML = '<div class="empty-state">🔒 ההימורים יוצגו לאחר סגירת הדדליין הראשון</div>';
    return;
  }

  const picksMap = {};
  (allPicksData||[]).forEach(p => {
    if (!picksMap[p.user_id]) picksMap[p.user_id] = {};
    picksMap[p.user_id][p.series_id] = p;
  });

  const roundNames = { 1: 'סיבוב ראשון', 2: 'סיבוב שני', 3: 'גמר כנף', 4: 'גמר NBA' };
  let html = '';
  const rounds = [...new Set(lockedSeries.map(s => s.round))].sort();
  for (const round of rounds) {
    const roundSeries = lockedSeries.filter(s => s.round === round);
    html += `<div class="round-header"><div class="round-title">${roundNames[round]||'סיבוב '+round}</div></div>`;
    for (const s of roundSeries) {
      const res = results[s.id];
      html += `
        <div class="series-card" style="margin-bottom:16px">
          <div class="series-meta">
            <div class="series-name">${s.name}: <b style="color:var(--text)">${s.team1} vs ${s.team2}</b></div>
            ${res?`<div style="font-size:11px;color:var(--green);font-weight:700">✓ ${res.winner} (${res.games} משחקים)</div>`:''}
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead><tr style="color:var(--muted);font-size:11px;border-bottom:1px solid var(--border)">
              <th style="text-align:right;padding:6px 4px">שחקן</th>
              <th style="text-align:center;padding:6px 4px">מנצח</th>
              <th style="text-align:center;padding:6px 4px">משחקים</th>
              <th style="text-align:center;padding:6px 4px">נקודות</th>
            </tr></thead>
            <tbody>
              ${users.map(u => {
                const pick = picksMap[u.id]?.[s.id];
                const isMe = u.id === currentUser.id;
                let pts = '—', ptColor = 'var(--muted)';
                if (res && pick) {
                  if (pick.winner===res.winner && pick.games==res.games) { pts='+5 ✓'; ptColor='var(--green)'; }
                  else if (pick.winner===res.winner) { pts='+3'; ptColor='var(--gold)'; }
                  else { pts='0'; ptColor='var(--muted)'; }
                }
                return `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);${isMe?'background:rgba(249,115,22,0.05)':''}">
                  <td style="padding:8px 4px;font-weight:${isMe?700:400}">${u.nickname}${isMe?' 👤':''}</td>
                  <td style="text-align:center;padding:8px 4px">${pick?.winner||'—'}</td>
                  <td style="text-align:center;padding:8px 4px;color:var(--accent2)">${pick?.games?pick.games+' משחקים':'—'}</td>
                  <td style="text-align:center;padding:8px 4px;font-weight:700;color:${ptColor}">${pts}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
    }
  }
  el.innerHTML = html || '<div class="empty-state">אין נתונים</div>';
}

// ---- ADMIN ----
function openAdmin() {
  document.getElementById('admin-overlay').style.display = 'flex';
  adminAuthenticated ? renderAdminPanel() : renderAdminLogin();
}
function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; }
function closeAdminIfOutside(e) { if (e.target === document.getElementById('admin-overlay')) closeAdmin(); }

function renderAdminLogin() {
  document.getElementById('admin-modal').innerHTML = `
    <div class="admin-login">
      <div class="admin-modal-title">🔐 כניסת מנהל</div>
      <input type="password" id="admin-pass-input" placeholder="סיסמה" onkeydown="if(event.key==='Enter')verifyAdminPass()">
      <button class="btn-primary" onclick="verifyAdminPass()">כניסה</button>
      <div class="admin-error" id="admin-pass-error"></div>
      <button class="btn-close" onclick="closeAdmin()">ביטול</button>
    </div>`;
  setTimeout(() => document.getElementById('admin-pass-input')?.focus(), 100);
}

function verifyAdminPass() {
  if (document.getElementById('admin-pass-input').value === ADMIN_PASSWORD) {
    adminAuthenticated = true; renderAdminPanel();
  } else { document.getElementById('admin-pass-error').textContent = 'סיסמה שגויה'; }
}

function renderAdminPanel() {
  const seriesOptions = seriesData.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  const seriesOptionsEdit = seriesData.map(s => `<option value="${s.id}">${s.name} (${s.team1} vs ${s.team2})</option>`).join('');
  document.getElementById('admin-modal').innerHTML = `
    <div class="admin-modal-title">⚙️ פאנל מנהל</div>
    <div class="admin-section-title">📋 הכנסת תוצאה לסדרה</div>
    <div class="admin-row"><select id="res-series" onchange="updateWinnerDropdown()">${seriesOptions}</select></div>
    <div class="admin-row">
      <select id="res-winner" style="flex:2">
        <option value="">בחר קבוצה מנצחת</option>
      </select>
      <select id="res-games"><option value="4">4-0</option><option value="5">4-1</option><option value="6">4-2</option><option value="7">4-3</option></select>
      <button class="btn-admin" onclick="submitResult()">שמור</button>
    </div>
    <div id="res-msg"></div>
    <div class="admin-section-title" style="margin-top:20px">🏆 זוכה NBA</div>
    <div class="admin-row">
      <input class="admin-input" id="champ-winner" placeholder="קבוצה זוכה">
      <button class="btn-admin" onclick="submitChampResult()">שמור</button>
    </div>
    <div id="champ-msg"></div>
    <div class="admin-section-title" style="margin-top:20px">✏️ עדכון קבוצות בסדרה</div>
    <div class="admin-row"><select id="edit-series" onchange="fillEditFields()">${seriesOptionsEdit}</select></div>
    <div class="admin-row">
      <input class="admin-input" id="edit-team1" placeholder="קבוצה 1">
      <input class="admin-input" id="edit-team2" placeholder="קבוצה 2">
    </div>
    <div class="admin-row">
      <input class="admin-input" id="edit-deadline" placeholder="DD-MM-YYYY HH:MM" style="flex:2">
      <button class="btn-admin" onclick="updateSeries()">עדכן</button>
    </div>
    <div id="edit-msg"></div>
    <div class="admin-section-title" style="margin-top:20px">🗑️ איפוס תוצאה</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">מחק תוצאה כדי לפתוח סדרה מחדש</div>
    <div class="admin-row">
      <select id="reset-series">${seriesOptions}</select>
      <button class="btn-admin danger" onclick="resetResult()" style="background:var(--red);color:white">איפוס</button>
    </div>
    <div id="reset-msg"></div>
    <div class="admin-section-title" style="margin-top:20px">🏠 החלת הימור דיפולטי</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">משתמשים שלא הימרו יקבלו קבוצת בית ב-4-2</div>
    <div class="admin-row">
      <select id="default-series">${seriesOptions}</select>
      <button class="btn-admin" onclick="applyDefaultPicks()">החל</button>
    </div>
    <div id="default-msg"></div>
    <div class="admin-section-title" style="margin-top:20px">✏️ עריכת הימור משתמש (-2 נקודות)</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">שינוי הימור ע"י מנהל גורר עונש של -2</div>
    <div class="admin-row">
      <select id="edit-pick-series" onchange="loadUsersForSeries()" style="flex:2">${seriesOptions}</select>
    </div>
    <div class="admin-row">
      <select id="edit-pick-user" style="flex:2"><option value="">טוען משתמשים...</option></select>
    </div>
    <div class="admin-row">
      <select id="edit-pick-winner" style="flex:2"><option value="">בחר קבוצה</option></select>
      <select id="edit-pick-games"><option value="4">4-0</option><option value="5">4-1</option><option value="6">4-2</option><option value="7">4-3</option></select>
    </div>
    <div class="admin-row">
      <button class="btn-admin" onclick="adminEditPick()">שמור (-2 נק׳)</button>
    </div>
    <div id="edit-pick-msg"></div>
    <button class="btn-close" onclick="closeAdmin()">סגור</button>\``;
  fillEditFields();
  updateWinnerDropdown();
  loadUsersForSeries();
}

function updateWinnerDropdown() {
  const seriesId = document.getElementById('res-series').value;
  const s = seriesData.find(x => x.id === seriesId);
  const sel = document.getElementById('res-winner');
  if (!sel) return;
  sel.innerHTML = '<option value="">בחר קבוצה מנצחת</option>';
  if (s && !s.team1.startsWith('TBD') && !s.team2.startsWith('TBD')) {
    sel.innerHTML += `<option value="${s.team1}">${s.team1}</option><option value="${s.team2}">${s.team2}</option>`;
  } else if (s) {
    [s.team1, s.team2].forEach(t => {
      if (t) sel.innerHTML += `<option value="${t}">${t}</option>`;
    });
  }
}

async function resetResult() {
  const seriesId = document.getElementById('reset-series').value;
  const msgEl = document.getElementById('reset-msg');
  const { error } = await db.from('results').delete().eq('series_id', seriesId);
  if (error) { msgEl.innerHTML = `<div class="admin-error">שגיאה: ${error.message}</div>`; return; }
  delete results[seriesId];
  msgEl.innerHTML = '<div class="admin-success">✓ תוצאה אופסה — הסדרה פתוחה!</div>';
  renderTab();
}

async function applyDefaultPicks() {
  const seriesId = document.getElementById('default-series').value;
  const s = seriesData.find(x => x.id === seriesId);
  const msgEl = document.getElementById('default-msg');
  if (!s || s.team1.startsWith('TBD')) { msgEl.innerHTML = '<div class="admin-error">סדרה לא תקינה</div>'; return; }

  const { data: users } = await db.from('users').select('id, nickname');
  const { data: existingPicks } = await db.from('picks').select('user_id').eq('series_id', seriesId);
  const pickedUserIds = new Set((existingPicks || []).map(p => p.user_id));

  const unpickedUsers = (users || []).filter(u => !pickedUserIds.has(u.id));
  if (!unpickedUsers.length) { msgEl.innerHTML = '<div class="admin-success">כל המשתמשים כבר הימרו ✓</div>'; return; }

  // Insert default pick: team1 (home) wins 4-2
  for (const u of unpickedUsers) {
    await db.from('picks').upsert({
      user_id: u.id, series_id: seriesId,
      winner: s.team1, games: 6,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id,series_id' });
  }
  msgEl.innerHTML = `<div class="admin-success">✓ הוחל על ${unpickedUsers.length} משתמשים: ${s.team1} 4-2</div>`;
}

async function loadUsersForSeries() {
  const seriesId = document.getElementById('edit-pick-series').value;
  const s = seriesData.find(x => x.id === seriesId);
  const { data: users } = await db.from('users').select('id, nickname');
  const { data: picks } = await db.from('picks').select('*').eq('series_id', seriesId);
  const picksMap = {};
  if (picks) picks.forEach(p => { picksMap[p.user_id] = p; });

  const userSel = document.getElementById('edit-pick-user');
  userSel.innerHTML = users.map(u => {
    const pick = picksMap[u.id];
    const pickStr = pick ? ` (${pick.winner}, ${pick.games})` : ' (לא הימר)';
    return `<option value="${u.id}">${u.nickname}${pickStr}</option>`;
  }).join('');

  // Update winner dropdown
  const winnerSel = document.getElementById('edit-pick-winner');
  winnerSel.innerHTML = '<option value="">בחר קבוצה</option>';
  if (s) {
    [s.team1, s.team2].forEach(t => {
      if (t && !t.startsWith('TBD')) winnerSel.innerHTML += `<option value="${t}">${t}</option>`;
    });
  }
}

async function adminEditPick() {
  const seriesId = document.getElementById('edit-pick-series').value;
  const userId = document.getElementById('edit-pick-user').value;
  const winner = document.getElementById('edit-pick-winner').value;
  const games = parseInt(document.getElementById('edit-pick-games').value);
  const msgEl = document.getElementById('edit-pick-msg');
  if (!userId || !winner) { msgEl.innerHTML = '<div class="admin-error">נא לבחור משתמש וקבוצה</div>'; return; }

  // Save pick
  const { error } = await db.from('picks').upsert({
    user_id: userId, series_id: seriesId,
    winner, games, updated_at: new Date().toISOString()
  }, { onConflict: 'user_id,series_id' });
  if (error) { msgEl.innerHTML = `<div class="admin-error">שגיאה: ${error.message}</div>`; return; }

  // Apply -2 penalty
  await db.from('penalties').insert({ user_id: userId, series_id: seriesId, points: -2, reason: 'admin_edit', created_at: new Date().toISOString() });

  msgEl.innerHTML = '<div class="admin-success">✓ הימור עודכן + עונש -2 נקודות הוחל</div>';
}

function fillEditFields() {
  const s = seriesData.find(x => x.id === document.getElementById('edit-series')?.value);
  if (!s) return;
  document.getElementById('edit-team1').value = s.team1 || '';
  document.getElementById('edit-team2').value = s.team2 || '';
  // Convert ISO to DD-MM-YYYY HH:MM for display
  if (s.deadline) {
    const d = new Date(s.deadline);
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yyyy = d.getFullYear();
    const hh = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    document.getElementById('edit-deadline').value = `${dd}-${mm}-${yyyy} ${hh}:${min}`;
  } else {
    document.getElementById('edit-deadline').value = '';
  }
}

function parseDeadline(val) {
  if (!val || !val.trim()) return null;
  // Parse DD-MM-YYYY HH:MM
  const match = val.trim().match(/^(\d{2})-(\d{2})-(\d{4})\s+(\d{2}):(\d{2})$/);
  if (!match) return null;
  const [_, dd, mm, yyyy, hh, min] = match;
  return new Date(`${yyyy}-${mm}-${dd}T${hh}:${min}:00Z`).toISOString();
}

async function submitResult() {
  const seriesId = document.getElementById('res-series').value;
  const winner = document.getElementById('res-winner').value;
  const games = parseInt(document.getElementById('res-games').value);
  const msgEl = document.getElementById('res-msg');
  if (!winner) { msgEl.innerHTML = '<div class="admin-error">נא לבחור קבוצה מנצחת</div>'; return; }
  const { error } = await db.from('results').upsert({ series_id: seriesId, winner, games, updated_at: new Date().toISOString() }, { onConflict: 'series_id' });
  if (error) { msgEl.innerHTML = `<div class="admin-error">שגיאה: ${error.message}</div>`; return; }
  results[seriesId] = { winner, games };
  msgEl.innerHTML = '<div class="admin-success">✓ תוצאה נשמרה!</div>';
  renderTab();
}

async function submitChampResult() {
  const winner = document.getElementById('champ-winner').value.trim();
  const msgEl = document.getElementById('champ-msg');
  if (!winner) { msgEl.innerHTML = '<div class="admin-error">נא להכניס קבוצה זוכה</div>'; return; }
  const { error } = await db.from('results').upsert({ series_id: 'champ', winner, games: null, updated_at: new Date().toISOString() }, { onConflict: 'series_id' });
  if (error) { msgEl.innerHTML = `<div class="admin-error">שגיאה: ${error.message}</div>`; return; }
  champResult = winner;
  msgEl.innerHTML = '<div class="admin-success">✓ זוכה נשמר!</div>';
  renderTab();
}

async function updateSeries() {
  const seriesId = document.getElementById('edit-series').value;
  const team1 = document.getElementById('edit-team1').value.trim();
  const team2 = document.getElementById('edit-team2').value.trim();
  const deadlineRaw = document.getElementById('edit-deadline').value.trim();
  const deadline = parseDeadline(deadlineRaw);
  if (deadlineRaw && !deadline) { document.getElementById('edit-msg').innerHTML = '<div class="admin-error">פורמט שגוי — נסה DD-MM-YYYY HH:MM</div>'; return; }
  const msgEl = document.getElementById('edit-msg');
  if (!team1 || !team2) { msgEl.innerHTML = '<div class="admin-error">נא להכניס שתי קבוצות</div>'; return; }
  const orig = seriesData.find(s => s.id === seriesId);
  const { error } = await db.from('series').upsert({ ...orig, id: seriesId, team1, team2, deadline }, { onConflict: 'id' });
  if (error) { msgEl.innerHTML = `<div class="admin-error">שגיאה: ${error.message}</div>`; return; }

  // אם הדדליין החדש הוא בעתיד — אפס תוצאה אוטומטית
  const isDeadlineFuture = deadline && new Date() < new Date(deadline);
  if (isDeadlineFuture && results[seriesId]) {
    await db.from('results').delete().eq('series_id', seriesId);
    delete results[seriesId];
    msgEl.innerHTML = '<div class="admin-success">✓ סדרה עודכנה + תוצאה אופסה!</div>';
  } else {
    msgEl.innerHTML = '<div class="admin-success">✓ סדרה עודכנה!</div>';
  }

  const idx = seriesData.findIndex(s => s.id === seriesId);
  if (idx >= 0) { seriesData[idx].team1 = team1; seriesData[idx].team2 = team2; seriesData[idx].deadline = deadline; }
  renderTab();
}

  const saved = localStorage.getItem('nba_user');
  if (saved) { try { currentUser = JSON.parse(saved); showApp(); } catch(e) {} }
};
